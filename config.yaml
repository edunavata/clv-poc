storage:
  db_path: data/odds.duckdb

# Si el crédito restante (GET /sports, coste 0) cae por debajo de este
# margen tras descontar el coste estimado de la llamada, capture.py aborta
# ESE target sin gastar nada. Ver "Guardrail de coste vs cron" en el plan
# de spec 2 (docs/superpowers si se archiva, o el historial de la sesión).
min_remaining_credits: 20

targets:
  - name: world_cup_2026
    active: true
    sport_key: soccer_fifa_world_cup
    markets:
      - h2h
    sharp_book: pinnacle
    # Cobertura real confirmada 2026-07-06 (scripts/check_soft_book_coverage.py,
    # 1 crédito real): los 4 tenían precio en los 6 eventos del Mundial en ese momento.
    soft_books:
      - williamhill
      - betvictor
      - winamax_fr
      - marathonbet
    poll_interval_hours: 3   # cadencia global de trayectoria del daemon (por sport_key)

  - name: mls_2026
    active: true
    sport_key: soccer_usa_mls
    markets:
      - h2h
    sharp_book: pinnacle
    soft_books:
      - williamhill
      - betvictor
      - winamax_fr
      - marathonbet
    poll_interval_hours: 3

  # MLB -- ACTIVO. Complemento 2-way al 3-way del fútbol: de-vig limpio (sin empate),
  # partidos casi a diario hasta octubre (N crece rápido), Pinnacle muy sharp, y el
  # slate US se agrupa de tarde-noche => 1 poll captura muchos cierres.
  # Cobertura PENDIENTE de verificar (scripts/check_soft_book_coverage.py). OJO:
  # winamax_fr probablemente cotice pocos partidos aquí; la 1a captura lo confirma.
  - name: mlb_2026
    active: true
    sport_key: baseball_mlb
    markets:
      - h2h
    sharp_book: pinnacle
    soft_books:
      - williamhill
      - betvictor
      - winamax_fr
      - marathonbet
    poll_interval_hours: 3

  # --- Fútbol de verano en temporada (3-way) -- DESHABILITADOS hasta que ---
  # --- caduque world_cup (~19 jul) y se verifique cobertura por casa.     ---
